---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: database
  namespace: wallabag
spec:
  chart:
    spec:
      chart: cluster
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg-repo
  interval: 1m0s
  values:
    cluster:
      storage:
        size: 16Gi
        storageClass: longhorn-simple
      monitoring:
        enabled: true
